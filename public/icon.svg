<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Sfondo tondo verde teal -->
  <rect width="512" height="512" rx="112" fill="#0f766e"/>

  <!-- Sole raggi -->
  <g stroke="#fbbf24" stroke-width="14" stroke-linecap="round" opacity="0.7">
    <line x1="256" y1="68" x2="256" y2="92"/>
    <line x1="340" y1="92" x2="326" y2="110"/>
    <line x1="372" y1="172" x2="350" y2="178"/>
    <line x1="172" y1="92" x2="186" y2="110"/>
    <line x1="140" y1="172" x2="162" y2="178"/>
  </g>

  <!-- Sole cerchio -->
  <circle cx="256" cy="130" r="28" fill="#fbbf24"/>

  <!-- Tesa del sombrero (ovalona piatta) -->
  <ellipse cx="256" cy="310" rx="175" ry="32" fill="#14b8a6"/>
  <!-- Bordo tesa -->
  <ellipse cx="256" cy="310" rx="175" ry="32" fill="none" stroke="#0d9488" stroke-width="6"/>

  <!-- Corpo cappello (cupola) -->
  <path d="M148 312 Q148 220 256 215 Q364 220 364 312 Z" fill="#2dd4bf"/>
  <!-- Ombra laterale cupola -->
  <path d="M148 312 Q148 260 200 235 Q148 270 148 312 Z" fill="#14b8a6" opacity="0.5"/>

  <!-- Fascia decorativa -->
  <path d="M155 306 Q155 290 256 286 Q357 290 357 306" fill="none" stroke="#fbbf24" stroke-width="10" stroke-linecap="round"/>

  <!-- Pallino top cappello -->
  <circle cx="256" cy="216" r="10" fill="#fbbf24"/>

  <!-- Zzz sonno -->
  <text x="340" y="240" font-family="Arial Black, sans-serif" font-size="52" font-weight="900" fill="#fbbf24" opacity="0.9" letter-spacing="-2">z</text>
  <text x="362" y="210" font-family="Arial Black, sans-serif" font-size="36" font-weight="900" fill="#fbbf24" opacity="0.7">z</text>
  <text x="376" y="188" font-family="Arial Black, sans-serif" font-size="24" font-weight="900" fill="#fbbf24" opacity="0.5">z</text>

  <!-- Decorazioni tesa: motivi geometrici -->
  <g fill="#0d9488">
    <ellipse cx="110" cy="310" rx="18" ry="8" fill="#fbbf24" opacity="0.5"/>
    <ellipse cx="402" cy="310" rx="18" ry="8" fill="#fbbf24" opacity="0.5"/>
  </g>
</svg>
